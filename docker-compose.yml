# docker-compose.yml — Redis 학습 최소 토폴로지 (고정, §7)
# 평소 개발: docker compose up -d mysql redis  +  호스트 ./gradlew bootRun (localhost:8080)
# 다중 인스턴스 고통 재현: docker compose up -d --build mysql redis nginx --scale app=N  (nginx → localhost:80)
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
    ports: ["3307:3306"]   # 호스트 3306은 로컬 MySQL이 이미 사용 중 → 밖으로는 3307로 노출 (컨테이너 내부는 3306 유지)

  redis:
    image: redis:7        # vanilla 단일노드. persistence/eviction/cluster 무설정 — 답 미리 박지 않음.
    ports: ["6379:6379"]

  app:
    build: .              # 학습자의 Spring Boot Gradle 프로젝트. scale knob 대상.
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/app
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    expose: ["8080"]      # 포트 고정 매핑 안 함 — LB 뒤에서 N개로 뜨므로
    depends_on: [mysql, redis]

  nginx:
    image: nginx:1.27
    volumes: ["./nginx.conf:/etc/nginx/conf.d/default.conf:ro"]
    ports: ["80:80"]
    depends_on: [app]

  # ---- 관측 스택 (측정 도구 — 고통을 막지 않고 보여주기만 함, §7-2) ----
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes: ["./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro"]
    ports: ["9090:9090"]
    extra_hosts: ["host.docker.internal:host-gateway"]  # 호스트 bootRun 앱을 긁기 위해

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"   # 로컬 학습용 — 로그인 없이 바로 대시보드
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana     # UI에서 import한 대시보드·설정이 down 후에도 유지됨
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro   # 데이터소스 자동복구용
    ports: ["3000:3000"]
    depends_on: [prometheus]

volumes:
  grafana-data:
